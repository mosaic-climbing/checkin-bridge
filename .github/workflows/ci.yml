name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # TruffleHog is invoked by check-secrets.sh section 5 when the
      # binary is on PATH. Install it here so the --ci run gets full
      # coverage; locally, operators install via `brew`/`go install`
      # (hinted by the script's own warn path).
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin
          trufflehog --version
      - name: Run preflight secret check
        run: ./scripts/check-secrets.sh --ci
      - name: Gitleaks (belt & suspenders)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test & vet
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "::error::go.mod/go.sum not tidy. Run 'go mod tidy' locally and commit."
            git diff go.mod go.sum
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

      - name: Test with race detector + coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_SHA::7} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/bridge

      - name: Compute checksum
        run: |
          cd dist
          shasum -a 256 mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }} \
            > mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 30
