name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.1)'
        required: true

permissions:
  contents: write

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: ./scripts/check-secrets.sh --ci

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # No `go test -race` re-gate here. The tag points at a commit on main
      # that already passed the same `go test -race ./...` invocation in
      # ci.yml on its PR. Re-running it 3× across the build matrix on the
      # exact same tree adds wall-clock without catching anything new.

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN="mosaic-bridge-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.tag.outputs.tag }} -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/$BIN" \
            ./cmd/bridge
          cd dist
          shasum -a 256 "$BIN" > "$BIN.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Consolidate SHA256SUMS
        run: |
          cd dist
          rm -f SHA256SUMS
          for f in mosaic-bridge-*.sha256; do cat "$f" >> SHA256SUMS; done
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/mosaic-bridge-darwin-arm64
            dist/mosaic-bridge-darwin-arm64.sha256
            dist/mosaic-bridge-linux-arm64
            dist/mosaic-bridge-linux-arm64.sha256
            dist/mosaic-bridge-linux-amd64
            dist/mosaic-bridge-linux-amd64.sha256
            dist/SHA256SUMS
