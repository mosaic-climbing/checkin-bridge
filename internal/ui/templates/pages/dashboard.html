<div class="page-header">
    <h2>Dashboard</h2>
    <p>Real-time gym access overview</p>
</div>

<div hx-get="/ui/frag/stats" hx-trigger="load, every 10s" hx-swap="innerHTML">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">...</div><div class="stat-label">Loading</div></div>
    </div>
</div>

<div class="card">
    <h3>Recent Check-ins</h3>
    <div hx-get="/ui/frag/recent-checkins" hx-trigger="load, every 5s" hx-swap="innerHTML">
        <p style="color: var(--text-muted)">Loading...</p>
    </div>
</div>

<div class="card">
    <h3>Shadow Decisions</h3>
    <p style="color: var(--text-muted); margin-top: 4px">
        UniFi's native decision vs. the bridge's decision for each tap.
        Rows shown are <strong>disagreements only</strong> — investigate every one before flipping shadow mode off.
    </p>
    <div hx-get="/ui/frag/shadow-decisions" hx-trigger="load, every 10s" hx-swap="innerHTML">
        <p style="color: var(--text-muted)">Loading...</p>
    </div>
</div>
