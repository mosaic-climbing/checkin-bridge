<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic Bridge - Login</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #2d3436; }
        .login-box { background: #fff; border: 1px solid #dfe6e9; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .login-box h1 { font-size: 22px; margin-bottom: 8px; }
        .login-box h1 span { color: #6c5ce7; }
        .login-box p { color: #636e72; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,0.1); }
        .btn { width: 100%; padding: 12px; background: #6c5ce7; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #5b4bd5; }
        .error { color: #d63031; font-size: 14px; margin-bottom: 12px; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1><span>Mosaic</span> Bridge</h1>
        <p>Staff access to check-in management</p>
        <div id="login-error" class="error"></div>
        <form hx-post="/ui/login"
              hx-target="#login-error"
              hx-swap="innerHTML"
              hx-headers='{"X-Requested-With":"XMLHttpRequest"}'
              hx-on::after-request="if(event.detail.successful) window.location='/ui/'">
            <input type="password" name="password" placeholder="Staff password" required autofocus>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
</body>
</html>
